<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狐の窓 — PNGキャラ定義ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f0; --fg: #2a2a2a; --accent: #3a5ba0; --accent2: #5a7ab8;
    --panel: #ffffff; --panel2: #eef0f4; --input-bg: #ffffff; --input-border: #bbc;
    --border: #ccd; --border2: #dde; --muted: #667; --muted2: #889;
    --badge-base-bg: #d4edd4; --badge-base-fg: #2a6a2a;
    --badge-expr-bg: #d4d4ed; --badge-expr-fg: #2a2a6a;
    --badge-blink-bg: #ededd4; --badge-blink-fg: #6a6a2a;
    --badge-mouth-bg: #edd4d4; --badge-mouth-fg: #6a2a2a;
    --badge-unused-bg: #ddd; --badge-unused-fg: #666;
    --danger-bg: #ecc; --danger-fg: #933;
  }
  @media (prefers-color-scheme: dark) {
    :root:not(.light) {
      --bg: #1a1a2e; --fg: #e0e0e0; --accent: #a8c0ff; --accent2: #8899bb;
      --panel: #1a1a2e; --panel2: #16213e; --input-bg: #16213e; --input-border: #334;
      --border: #334; --border2: #223; --muted: #668; --muted2: #8899aa;
      --badge-base-bg: #2a4a2a; --badge-base-fg: #8f8;
      --badge-expr-bg: #2a2a4a; --badge-expr-fg: #88f;
      --badge-blink-bg: #4a4a2a; --badge-blink-fg: #ff8;
      --badge-mouth-bg: #4a2a2a; --badge-mouth-fg: #f88;
      --badge-unused-bg: #333; --badge-unused-fg: #888;
      --danger-bg: #663333; --danger-fg: #ff8888;
    }
  }
  :root.dark {
    --bg: #1a1a2e; --fg: #e0e0e0; --accent: #a8c0ff; --accent2: #8899bb;
    --panel: #1a1a2e; --panel2: #16213e; --input-bg: #16213e; --input-border: #334;
    --border: #334; --border2: #223; --muted: #668; --muted2: #8899aa;
    --badge-base-bg: #2a4a2a; --badge-base-fg: #8f8;
    --badge-expr-bg: #2a2a4a; --badge-expr-fg: #88f;
    --badge-blink-bg: #4a4a2a; --badge-blink-fg: #ff8;
    --badge-mouth-bg: #4a2a2a; --badge-mouth-fg: #f88;
    --badge-unused-bg: #333; --badge-unused-fg: #888;
    --danger-bg: #663333; --danger-fg: #ff8888;
  }
  body {
    font-family: "Zen Maru Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg); color: var(--fg); padding: 20px; line-height: 1.6;
  }
  h1 { font-size: 1.4rem; margin-bottom: 8px; color: var(--accent); }
  h2 { font-size: 1rem; margin: 16px 0 8px; color: var(--accent); }
  h3 { font-size: 0.9rem; margin: 12px 0 6px; color: var(--accent2); }
  .container { max-width: 1200px; margin: 0 auto; }
  .help { font-size: 0.8rem; color: var(--muted); margin: 4px 0; }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 20px;
    text-align: center; color: var(--muted); margin-bottom: 16px;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone.dragover { border-color: var(--accent); background: rgba(168,192,255,0.05); color: var(--accent); }
  .drop-zone .file-count { margin-top: 8px; font-size: 0.85rem; color: var(--accent); }

  .tab-bar { display: flex; gap: 4px; flex-wrap: wrap; margin: 12px 0 0; align-items: center; }
  .tab-btn {
    padding: 6px 16px; background: var(--panel2); color: var(--muted2); border: 1px solid var(--border);
    border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.85rem;
  }
  .tab-btn.active { background: var(--panel); color: var(--accent); border-color: var(--accent); font-weight: bold; }
  .tab-btn.add-tab { background: none; border: 1px dashed var(--border); color: var(--muted); }
  .tab-btn.add-tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab-content {
    border: 1px solid var(--border); border-radius: 0 6px 6px 6px; padding: 16px; background: var(--panel);
    display: none;
  }
  .tab-content.active { display: block; }

  .dir-tab-bar { display: flex; gap: 2px; margin: 8px 0; align-items: center; }
  .dir-tab-btn {
    padding: 4px 12px; background: var(--panel2); color: var(--muted); border: 1px solid var(--border2);
    border-bottom: none; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 0.8rem;
  }
  .dir-tab-btn.active { background: var(--panel2); color: var(--accent); border-color: var(--border); font-weight: bold; }
  .dir-tab-btn.add-dir { background: none; border: 1px dashed var(--border); color: var(--muted); font-size: 0.75rem; }
  .dir-tab-btn.add-dir:hover { border-color: var(--accent); color: var(--accent); }
  .dir-panel { border: 1px solid var(--border2); border-radius: 0 4px 4px 4px; padding: 12px; background: var(--panel2); display: none; }
  .dir-panel.active { display: block; }

  label { font-size: 0.85rem; color: var(--muted2); display: block; margin-bottom: 2px; }
  input[type="text"], input[type="number"] {
    background: var(--input-bg); color: var(--fg); border: 1px solid var(--input-border);
    border-radius: 4px; padding: 6px 10px;
    font-family: "IBM Plex Mono", "Consolas", monospace; font-size: 0.85rem; width: 100%;
  }
  input:focus { outline: none; border-color: var(--accent); }
  select {
    background: var(--input-bg); color: var(--fg); border: 1px solid var(--input-border);
    border-radius: 4px; padding: 4px 8px; font-size: 0.85rem;
  }
  textarea {
    width: 100%; min-height: 260px; background: var(--input-bg); color: var(--fg);
    border: 1px solid var(--input-border); border-radius: 6px; padding: 12px;
    font-family: "IBM Plex Mono", "Consolas", monospace; font-size: 0.85rem;
    line-height: 1.5; resize: vertical;
  }
  button {
    padding: 8px 20px; background: var(--accent); color: var(--bg); border: none;
    border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; margin-right: 6px;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--border); color: var(--accent); }
  button.secondary:hover { opacity: 0.85; }
  button.small { padding: 4px 12px; font-size: 0.8rem; }
  button.danger { background: var(--danger-bg); color: var(--danger-fg); }
  button.danger:hover { opacity: 0.85; }
  .buttons { margin: 12px 0; }
  .field-row { margin-bottom: 10px; }

  .main-layout { display: flex; gap: 20px; }
  .config-panel { flex: 1; min-width: 0; }
  .preview-panel { width: 300px; flex-shrink: 0; }

  .role-section { margin-bottom: 12px; }
  .role-item {
    display: flex; align-items: center; gap: 8px; padding: 4px 8px;
    background: var(--panel); border: 1px solid var(--border2); border-radius: 4px; margin-bottom: 4px; font-size: 0.85rem;
  }
  .role-item .filename { font-family: "IBM Plex Mono", monospace; font-size: 0.8rem; }
  .role-item .noblink-cb { accent-color: var(--accent); }
  .inline-select { display: inline; margin: 0; font-size: 0.75rem; color: var(--muted2); }
  .expr-overrides { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 2px; }
  .expr-overrides label { display: inline; font-size: 0.72rem; color: var(--muted); }

  .preview-box {
    position: relative; width: 100%; aspect-ratio: 3/4;
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .preview-box img { position: absolute; top: 0; left: 0; width: 100%; height: auto; }
  .preview-label { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 4px; }
  @keyframes breathing {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50% { transform: scaleY(1.003) translateY(-0.15%); }
  }
  .preview-box.breathing { animation: breathing 4s ease-in-out infinite; transform-origin: bottom center; }

  .badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: bold;
  }
  .badge-base { background: var(--badge-base-bg); color: var(--badge-base-fg); }
  .badge-expr { background: var(--badge-expr-bg); color: var(--badge-expr-fg); }
  .badge-blink { background: var(--badge-blink-bg); color: var(--badge-blink-fg); }
  .badge-mouth { background: var(--badge-mouth-bg); color: var(--badge-mouth-fg); }
  .badge-unused { background: var(--badge-unused-bg); color: var(--badge-unused-fg); }

  .add-row { display: flex; gap: 4px; margin-top: 4px; }
  .add-row input { flex: 1; }

  hr { border-color: var(--border); margin: 16px 0; }

  .theme-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 100;
    padding: 6px 14px; background: var(--panel2); color: var(--muted2);
    border: 1px solid var(--border); border-radius: 20px; cursor: pointer;
    font-size: 0.8rem;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); background: var(--panel2); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Dark</button>
<div class="container">
  <h1>狐の窓 — PNGキャラ定義ツール</h1>
  <p class="help">
    world.json 用のキャラ定義を組み立てるツールです。<br>
    画像を一括ドロップすると <code>{キャラID}-{向き}-{種別}.png</code> から自動分類します。手動追加もできます。
  </p>

  <div class="drop-zone" id="globalDrop">
    画像ファイルをここにまとめてドロップ（自動分類）<br>
    <span style="font-size:0.8rem;">命名規則に合わないファイルもスキップせず読み込みます</span>
    <div class="file-count" id="fileCount"></div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn add-tab" onclick="addCharacterPrompt()">+ キャラ追加</button>
  </div>
  <div id="charPanels"></div>

  <hr>
  <div class="buttons">
    <button onclick="generateWorldJson()">world.json を生成</button>
    <button class="secondary" onclick="copyOutput()">コピー</button>
  </div>
  <h2>出力（world.json の characters 部分）</h2>
  <textarea id="output" readonly></textarea>
</div>

<script>
// ===== テーマ切替 =====
function toggleTheme() {
  const root = document.documentElement;
  const isDark = root.classList.contains('dark') ||
    (!root.classList.contains('light') && matchMedia('(prefers-color-scheme: dark)').matches);
  root.classList.remove('light', 'dark');
  root.classList.add(isDark ? 'light' : 'dark');
  updateThemeBtn();
  localStorage.setItem('png-define-theme', isDark ? 'light' : 'dark');
}
function updateThemeBtn() {
  const root = document.documentElement;
  const isDark = root.classList.contains('dark') ||
    (!root.classList.contains('light') && matchMedia('(prefers-color-scheme: dark)').matches);
  document.getElementById('themeBtn').textContent = isDark ? 'Light' : 'Dark';
}
(function initTheme() {
  const saved = localStorage.getItem('png-define-theme');
  if (saved) document.documentElement.classList.add(saved);
  updateThemeBtn();
})();

// ===== 自動分類ルール =====
// 部分一致で自動分類（先にマッチしたルールが優先）
const AUTO_RULES = [
  { test: v => v === 'normal', role: 'base' },
  { test: v => v.includes('blink') || v.includes('close'), role: v => {
    // デフォルト瞬きか差分かを判定: blink/close のみ→デフォルト、それ以外→瞬き1
    const bare = v.replace(/[-_]?(blink|eyesclosed|close)/g, '').trim();
    return bare ? 'blink-1' : 'blink';
  }},
  { test: v => v.includes('mouth'), role: v => {
    const bare = v.replace(/[-_]?(mouth|open)/g, '').trim();
    return bare ? 'mouth-1' : 'mouth';
  }},
];
const ROLE_LABELS = {
  'base': 'ベース', 'expression': '表情',
  'blink': '瞬き', 'blink-1': '瞬き1', 'blink-2': '瞬き2', 'blink-3': '瞬き3',
  'mouth': '口パク', 'mouth-1': '口パク1', 'mouth-2': '口パク2', 'mouth-3': '口パク3',
  'unused': '未使用',
};
const ALL_ROLES = ['base','expression','blink','blink-1','blink-2','blink-3','mouth','mouth-1','mouth-2','mouth-3','unused'];
const BLINK_ROLES = ['blink','blink-1','blink-2','blink-3'];
const MOUTH_ROLES = ['mouth','mouth-1','mouth-2','mouth-3'];

// ===== 状態 =====
// dir data: { files: [{filename, role, objectURL, typeName}], noBlink: Set, exprBlink: {}, exprMouth: {} }
const chars = {};          // charId -> { directions: { dir -> dirData } }
const imgCache = {};       // filename -> objectURL
let activeChar = null;
const activeDir = {};      // charId -> dir

// ===== ファイル名パーサー =====
function parseFilename(name) {
  const stem = name.replace(/\.[^.]+$/, '');
  const parts = stem.split('-');
  if (parts.length >= 3) {
    return { charId: parts[0], dir: parts[1], typeName: parts.slice(2).join('-') };
  }
  return null;
}

function autoClassify(typeName) {
  const v = typeName.toLowerCase();
  for (const rule of AUTO_RULES) {
    if (rule.test(v)) return typeof rule.role === 'function' ? rule.role(v) : rule.role;
  }
  return 'expression';
}

// ===== キャラ・向き操作 =====
function ensureChar(id) {
  if (!chars[id]) chars[id] = { directions: {} };
  return chars[id];
}
function ensureDir(charId, dir) {
  const c = ensureChar(charId);
  if (!c.directions[dir]) c.directions[dir] = { files: [], noBlink: new Set(), exprBlink: {}, exprMouth: {}, blinkFrameMs: 90 };
  return c.directions[dir];
}
function addFile(charId, dir, filename, role, typeName, objectURL) {
  const d = ensureDir(charId, dir);
  if (d.files.find(f => f.filename === filename)) return;
  const stem = filename.replace(/\.[^.]+$/, '');
  const ext = filename.includes('.') ? filename.slice(filename.lastIndexOf('.')) : '.png';
  d.files.push({ filename, role, objectURL: objectURL || null, typeName, stem, ext });
}

// ===== ドロップ =====
const dropZone = document.getElementById('globalDrop');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  let auto = 0, manual = 0;
  for (const file of e.dataTransfer.files) {
    if (!file.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(file);
    imgCache[file.name] = url;
    const parsed = parseFilename(file.name);
    if (parsed) {
      const role = autoClassify(parsed.typeName);
      addFile(parsed.charId, parsed.dir, file.name, role, parsed.typeName, url);
      auto++;
    } else {
      // 規則外: 未分類プールへ（最初のキャラの最初の向きに仮配置）
      const firstChar = Object.keys(chars)[0] || 'char1';
      const firstDir = Object.keys(ensureChar(firstChar).directions)[0] || 'left';
      const stem = file.name.replace(/\.[^.]+$/, '');
      addFile(firstChar, firstDir, file.name, 'unused', stem, url);
      manual++;
    }
  }
  document.getElementById('fileCount').textContent =
    `${auto + manual} ファイル読み込み（自動分類: ${auto}、手動確認: ${manual}）`;
  rebuild();
});

// ===== キャラ追加 =====
function addCharacterPrompt() {
  const id = prompt('キャラID（英字）:');
  if (!id || !id.trim()) return;
  const charId = id.trim();
  ensureDir(charId, 'left');
  ensureDir(charId, 'right');
  activeChar = charId;
  rebuild();
}
function addDirPrompt(charId) {
  const name = prompt('向き名（left, right, center 等）:');
  if (!name || !name.trim()) return;
  ensureDir(charId, name.trim());
  activeDir[charId] = name.trim();
  rebuild();
}
function removeChar(charId) {
  delete chars[charId]; delete activeDir[charId];
  if (activeChar === charId) activeChar = null;
  rebuild();
}
function removeDir(charId, dir) {
  delete chars[charId].directions[dir];
  if (activeDir[charId] === dir) activeDir[charId] = null;
  rebuild();
}

// ===== UI =====
function rebuild() {
  const tabBar = document.getElementById('tabBar');
  const panels = document.getElementById('charPanels');
  // タブバー再構築（追加ボタンを残す）
  const addBtn = tabBar.querySelector('.add-tab');
  tabBar.querySelectorAll('.tab-btn:not(.add-tab)').forEach(b => b.remove());
  panels.innerHTML = '';
  const ids = Object.keys(chars).sort();
  if (!activeChar && ids.length > 0) activeChar = ids[0];
  for (const id of ids) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (id === activeChar ? ' active' : '');
    btn.textContent = id;
    btn.onclick = () => { activeChar = id; rebuild(); };
    tabBar.insertBefore(btn, addBtn);

    const panel = document.createElement('div');
    panel.className = 'tab-content' + (id === activeChar ? ' active' : '');
    panel.innerHTML = buildCharHTML(id);
    panels.appendChild(panel);
  }
}

function buildCharHTML(charId) {
  const c = chars[charId];
  const dirs = Object.keys(c.directions).sort();
  const curDir = activeDir[charId] || dirs[0] || null;
  if (curDir && !activeDir[charId]) activeDir[charId] = curDir;

  let h = `<div class="main-layout"><div class="config-panel">
    <div class="field-row" style="display:flex;gap:12px;align-items:flex-end;">
      <div style="flex:1;"><label>キャラID</label>
        <input type="text" value="${charId}" style="width:180px"
          onchange="renameChar('${charId}',this.value)"></div>
      <div><label>path プレフィックス</label>
        <input type="text" id="pfx-${charId}" placeholder="characters/${charId}/"
          value="characters/${charId}/" style="width:260px"></div>
      <div><button class="small danger" onclick="removeChar('${charId}')">削除</button></div>
    </div><hr style="border-color:var(--border2);margin:8px 0;">`;

  // 向きタブ
  h += `<div class="dir-tab-bar">`;
  for (const d of dirs) {
    h += `<button class="dir-tab-btn${d===curDir?' active':''}"
      onclick="activeDir['${charId}']='${d}';rebuild()">${d}</button>`;
  }
  h += `<button class="dir-tab-btn add-dir" onclick="addDirPrompt('${charId}')">+ 向き</button></div>`;

  for (const d of dirs) {
    h += `<div class="dir-panel${d===curDir?' active':''}">`;
    h += buildDirHTML(charId, d);
    h += `</div>`;
  }

  // プレビュー
  h += `</div><div class="preview-panel">
    <h2>プレビュー</h2>
    <div class="preview-box breathing" id="pv-${charId}"></div>
    <div class="preview-label" id="pvl-${charId}">-</div>
    <div style="margin-top:8px;"><label>表情</label>
      <select id="pvs-${charId}" onchange="updatePreview('${charId}')">
        ${exprOptions(charId, curDir)}
      </select>
    </div>
  </div></div>`;
  return h;
}

function buildDirHTML(charId, dir) {
  const dd = chars[charId].directions[dir];
  const files = dd.files;
  const byRole = {};
  for (const f of files) { (byRole[f.role] = byRole[f.role] || []).push(f); }

  // ヘルパー: ファイル行
  const fileRow = (f, extras) => `<div class="role-item">
    <input type="text" class="filename" value="${f.typeName}" style="width:120px;padding:2px 6px;font-size:0.8rem;"
      onchange="renameTypeName('${charId}','${dir}','${f.filename}',this.value)"
      title="定義名を変更（ダブルクリックで編集）">${extras || ''}
    <select class="role-select" style="width:100px"
      onchange="chgRole('${charId}','${dir}','${f.filename}',this.value)">
      ${ALL_ROLES.map(r=>`<option value="${r}"${r===f.role?' selected':''}>${ROLE_LABELS[r]}</option>`).join('')}
    </select>
    <button class="small danger" style="padding:2px 6px;font-size:0.7rem;"
      onclick="rmFile('${charId}','${dir}','${f.filename}')">×</button>
  </div>`;

  // 表情の瞬き・口パクオーバーレイ選択肢を構築（存在するセットのみ）
  const blinkSets = [];
  for (const r of BLINK_ROLES) {
    if ((byRole[r]||[]).length > 0) blinkSets.push([r === 'blink' ? 'default' : r, ROLE_LABELS[r]]);
  }
  const mouthSets = [];
  for (const r of MOUTH_ROLES) {
    if ((byRole[r]||[]).length > 0) mouthSets.push([r === 'mouth' ? 'default' : r, ROLE_LABELS[r]]);
  }

  let h = '';

  // ベース
  h += `<div class="role-section"><h3><span class="badge badge-base">ベース</span> 通常立ち絵</h3>`;
  for (const f of (byRole['base']||[])) h += fileRow(f);
  if (!(byRole['base']||[]).length) h += `<p class="help">ベース画像なし</p>`;
  h += `</div>`;

  // 表情
  h += `<div class="role-section"><h3><span class="badge badge-expr">表情</span> 差し替え立ち絵</h3>`;
  for (const f of (byRole['expression']||[])) {
    const nb = dd.noBlink.has(f.typeName);
    const curEB = dd.exprBlink[f.typeName] || 'default';
    const curEM = dd.exprMouth[f.typeName] || 'default';
    let extras = `
      <label class="inline-select"><input type="checkbox" ${nb?'checked':''}
        onchange="togNB('${charId}','${dir}','${f.typeName}',this.checked)"> 瞬き禁止</label>`;
    if (blinkSets.length > 1) {
      extras += ` <label class="inline-select">瞬き:
        <select onchange="setEB('${charId}','${dir}','${f.typeName}',this.value)">
          ${blinkSets.map(([v,l])=>`<option value="${v}"${v===curEB?' selected':''}>${l}</option>`).join('')}
        </select></label>`;
    }
    if (mouthSets.length > 1) {
      extras += ` <label class="inline-select">口パク:
        <select onchange="setEM('${charId}','${dir}','${f.typeName}',this.value)">
          ${mouthSets.map(([v,l])=>`<option value="${v}"${v===curEM?' selected':''}>${l}</option>`).join('')}
        </select></label>`;
    }
    h += fileRow(f, extras);
  }
  if (!(byRole['expression']||[]).length) h += `<p class="help">表情差分なし</p>`;
  h += `</div>`;

  // 瞬きセクション（デフォルト + 1〜3）
  for (const r of BLINK_ROLES) {
    const items = byRole[r] || [];
    if (r === 'blink') {
      h += `<div class="role-section"><h3><span class="badge badge-blink">${ROLE_LABELS[r]}</span> フレーム</h3>`;
      for (const f of items) h += fileRow(f);
      if (!items.length) h += `<p class="help">なし</p>`;
      if (items.length) {
        h += `<div style="margin:8px 0;display:flex;align-items:center;gap:8px;">`;
        h += `<label style="font-size:0.8rem;color:var(--muted2);white-space:nowrap;">1コマ</label>`;
        h += `<input type="range" min="30" max="300" step="10" value="${dd.blinkFrameMs}"
          oninput="setBlinkFrameMs('${charId}','${dir}',+this.value)" style="flex:1;">`;
        h += `<span id="bfms-${charId}-${dir}" style="font-size:0.8rem;color:var(--muted2);min-width:50px;">${dd.blinkFrameMs}ms</span>`;
        h += `</div>`;
      }
      h += `</div>`;
    } else if (items.length > 0) {
      h += `<div class="role-section"><h3><span class="badge badge-blink">${ROLE_LABELS[r]}</span> フレーム</h3>`;
      for (const f of items) h += fileRow(f);
      h += `</div>`;
    }
  }

  // 口パクセクション（デフォルト + 1〜3）
  {
    const allMouth = MOUTH_ROLES.flatMap(r => byRole[r] || []);
    h += `<div class="role-section"><h3><span class="badge badge-mouth">口パク</span> オーバーレイ</h3>`;
    if (allMouth.length) {
      for (const r of MOUTH_ROLES) {
        for (const f of (byRole[r] || [])) {
          const label = r !== 'mouth' ? ` <span class="badge badge-mouth" style="font-size:0.65rem;">${ROLE_LABELS[r]}</span>` : '';
          h += fileRow(f, label);
        }
      }
    } else {
      h += `<p class="help">なし</p>`;
    }
    h += `</div>`;
  }

  // 未使用
  if ((byRole['unused']||[]).length > 0) {
    h += `<div class="role-section"><h3><span class="badge badge-unused">未使用</span></h3>`;
    for (const f of byRole['unused']) h += fileRow(f);
    h += `</div>`;
  }

  // 手動ファイル追加
  h += `<div class="add-row">
    <input type="text" id="addF-${charId}-${dir}" placeholder="ファイル名（例: smile.png）">
    <select id="addR-${charId}-${dir}">${ALL_ROLES.map(r=>`<option value="${r}">${ROLE_LABELS[r]}</option>`).join('')}</select>
    <button class="small secondary" onclick="addManualFile('${charId}','${dir}')">追加</button>
  </div>`;

  // 向き削除
  h += `<div style="margin-top:12px;text-align:right;">
    <button class="small danger" onclick="removeDir('${charId}','${dir}')">この向きを削除</button>
  </div>`;

  return h;
}

function exprOptions(charId, dir) {
  if (!dir || !chars[charId]?.directions[dir]) return '<option>-</option>';
  const exprs = ['normal'];
  for (const f of chars[charId].directions[dir].files) {
    if (f.role === 'expression' && !exprs.includes(f.typeName)) exprs.push(f.typeName);
  }
  return exprs.map(e => `<option value="${e}">${e}</option>`).join('');
}

// ===== データ操作 =====
function chgRole(charId, dir, filename, newRole) {
  const dd = chars[charId].directions[dir];
  const f = dd.files.find(x => x.filename === filename);
  if (!f) return;
  if (f.role === 'expression') { dd.noBlink.delete(f.typeName); delete dd.exprBlink[f.typeName]; delete dd.exprMouth[f.typeName]; }
  f.role = newRole;
  rebuild();
}
function rmFile(charId, dir, filename) {
  const dd = chars[charId].directions[dir];
  const idx = dd.files.findIndex(f => f.filename === filename);
  if (idx >= 0) {
    const f = dd.files[idx];
    dd.noBlink.delete(f.typeName); delete dd.exprBlink[f.typeName]; delete dd.exprMouth[f.typeName];
    dd.files.splice(idx, 1);
  }
  rebuild();
}
function togNB(charId, dir, typeName, on) {
  const dd = chars[charId].directions[dir];
  on ? dd.noBlink.add(typeName) : dd.noBlink.delete(typeName);
}
function setEB(charId, dir, typeName, val) {
  const dd = chars[charId].directions[dir];
  if (val === 'default') delete dd.exprBlink[typeName];
  else dd.exprBlink[typeName] = val;
}
function setEM(charId, dir, typeName, val) {
  const dd = chars[charId].directions[dir];
  if (val === 'default') delete dd.exprMouth[typeName];
  else dd.exprMouth[typeName] = val;
}
function setBlinkFrameMs(charId, dir, val) {
  const dd = chars[charId].directions[dir];
  dd.blinkFrameMs = val;
  const label = document.getElementById(`bfms-${charId}-${dir}`);
  if (label) label.textContent = val + 'ms';
}
function renameChar(oldId, newId) {
  newId = (newId||'').trim();
  if (!newId || newId === oldId || chars[newId]) return;
  chars[newId] = chars[oldId]; delete chars[oldId];
  if (activeChar === oldId) activeChar = newId;
  if (activeDir[oldId]) { activeDir[newId] = activeDir[oldId]; delete activeDir[oldId]; }
  rebuild();
}
function renameTypeName(charId, dir, filename, newName) {
  newName = (newName||'').trim();
  if (!newName) return;
  const dd = chars[charId].directions[dir];
  const f = dd.files.find(x => x.filename === filename);
  if (!f) return;
  const oldName = f.typeName;
  if (oldName === newName) return;
  // noBlink の更新
  if (dd.noBlink.has(oldName)) { dd.noBlink.delete(oldName); dd.noBlink.add(newName); }
  // exprBlink の更新
  if (dd.exprBlink[oldName] != null) { dd.exprBlink[newName] = dd.exprBlink[oldName]; delete dd.exprBlink[oldName]; }
  // exprMouth の更新
  if (dd.exprMouth[oldName] != null) { dd.exprMouth[newName] = dd.exprMouth[oldName]; delete dd.exprMouth[oldName]; }
  f.typeName = newName;
  rebuild();
}
function addManualFile(charId, dir) {
  const inp = document.getElementById(`addF-${charId}-${dir}`);
  const sel = document.getElementById(`addR-${charId}-${dir}`);
  const filename = (inp.value||'').trim();
  if (!filename) return;
  const typeName = filename.replace(/\.[^.]+$/, '');
  addFile(charId, dir, filename, sel.value, typeName, imgCache[filename] || null);
  inp.value = '';
  rebuild();
}

// ===== プレビュー（アニメーション付き） =====
let previewAnim = null; // { charId, rafId, blinkImgs, mouthImg, state }

function stopPreviewAnim() {
  if (previewAnim) {
    cancelAnimationFrame(previewAnim.rafId);
    previewAnim = null;
  }
}

function updatePreview(charId) {
  stopPreviewAnim();
  const box = document.getElementById(`pv-${charId}`);
  const label = document.getElementById(`pvl-${charId}`);
  if (!box) return;
  box.innerHTML = '';
  const dir = activeDir[charId];
  if (!dir || !chars[charId]?.directions[dir]) { label.textContent = '-'; return; }
  const dd = chars[charId].directions[dir];
  const files = dd.files;
  const expr = document.getElementById(`pvs-${charId}`)?.value || 'normal';

  const base = files.find(f => f.role === 'base');
  if (!base?.objectURL) { label.textContent = 'ベース画像なし'; return; }
  box.appendChild(mkImg(base.objectURL));

  // 表情レイヤー
  if (expr !== 'normal') {
    const ef = files.find(f => f.role === 'expression' && f.typeName === expr);
    if (ef?.objectURL) box.appendChild(mkImg(ef.objectURL));
  }

  // 瞬きレイヤー（非表示で配置、アニメーションで制御）
  const canBlink = !dd.noBlink.has(expr);
  const blinkSetName = dd.exprBlink[expr] || 'blink';
  const blinkFiles = canBlink
    ? files.filter(f => f.role === blinkSetName).sort((a, b) => a.typeName < b.typeName ? -1 : 1)
    : [];
  const blinkImgs = [];
  for (const bf of blinkFiles) {
    if (!bf.objectURL) continue;
    const img = mkImg(bf.objectURL);
    img.style.opacity = '0';
    box.appendChild(img);
    blinkImgs.push(img);
  }

  // 口パクレイヤー（非表示で配置、アニメーションで制御）
  const mouthSetName = dd.exprMouth[expr] || 'mouth';
  const mf = files.find(f => f.role === mouthSetName);
  let mouthImg = null;
  if (mf?.objectURL) {
    mouthImg = mkImg(mf.objectURL);
    mouthImg.style.opacity = '0';
    box.appendChild(mouthImg);
  }

  label.textContent = `${dir} / ${expr}`;

  // アニメーションループ開始
  if (blinkImgs.length > 0 || mouthImg) {
    const anim = {
      charId,
      blinkImgs,
      mouthImg,
      // 瞬き状態
      nextBlinkTime: performance.now() + 2000 + Math.random() * 3000,
      blinkPhase: -1, // -1=待機, 0～=フレーム再生中
      blinkFrameStart: 0,
      blinkFrameMs: dd.blinkFrameMs || 90,
      // 口パク状態
      mouthPhase: 0,
      mouthActive: true,
      mouthCycleEnd: performance.now() + 3000 + Math.random() * 4000,
      mouthPaused: false,
      rafId: 0,
    };

    function tick(now) {
      // --- 瞬き ---
      if (anim.blinkImgs.length > 0) {
        if (anim.blinkPhase === -1) {
          // 待機中 → 時間が来たら開始
          if (now >= anim.nextBlinkTime) {
            anim.blinkPhase = 0;
            anim.blinkFrameStart = now;
            showBlinkFrame(anim, 0);
          }
        } else {
          // フレーム再生中
          const elapsed = now - anim.blinkFrameStart;
          const totalFrames = anim.blinkImgs.length;
          // 閉じ → 開き: frames順に表示、その後逆順
          const sequence = totalFrames * 2; // 半目→閉じ→半目→消し
          const frameIdx = Math.floor(elapsed / anim.blinkFrameMs);
          if (frameIdx >= sequence) {
            // 瞬き終了
            hideAllBlink(anim);
            anim.blinkPhase = -1;
            anim.nextBlinkTime = now + 2000 + Math.random() * 4000;
          } else {
            // 往復: 0,1,...,n-1, n-2,...,0
            const actualIdx = frameIdx < totalFrames
              ? frameIdx
              : (sequence - 1 - frameIdx);
            showBlinkFrame(anim, actualIdx);
          }
        }
      }

      // --- 口パク ---
      if (anim.mouthImg) {
        if (anim.mouthPaused) {
          if (now >= anim.mouthCycleEnd) {
            anim.mouthPaused = false;
            anim.mouthPhase = 0;
            anim.mouthCycleEnd = now + 2000 + Math.random() * 3000;
          }
        } else {
          anim.mouthPhase += 0.135;
          const val = Math.sin(anim.mouthPhase * 3.5);
          anim.mouthImg.style.opacity = val > 0.3 ? '1' : '0';
          if (now >= anim.mouthCycleEnd) {
            anim.mouthPaused = true;
            anim.mouthImg.style.opacity = '0';
            anim.mouthCycleEnd = now + 1500 + Math.random() * 2000;
          }
        }
      }

      anim.rafId = requestAnimationFrame(tick);
    }

    anim.rafId = requestAnimationFrame(tick);
    previewAnim = anim;
  }
}

function showBlinkFrame(anim, idx) {
  for (let i = 0; i < anim.blinkImgs.length; i++) {
    anim.blinkImgs[i].style.opacity = i === idx ? '1' : '0';
  }
}
function hideAllBlink(anim) {
  for (const img of anim.blinkImgs) img.style.opacity = '0';
}

function mkImg(src) {
  const img = document.createElement('img');
  img.src = src;
  return img;
}

// ===== world.json 生成 =====
function generateWorldJson() {
  const result = { type: 'png', characters: {} };
  for (const [charId, c] of Object.entries(chars)) {
    const dirs = Object.keys(c.directions);
    if (!dirs.length) continue;
    const prefix = document.getElementById(`pfx-${charId}`)?.value?.trim() || '';
    const single = dirs.length === 1 && dirs[0] === 'center';
    if (single) {
      const def = buildDef(c.directions[dirs[0]], prefix);
      if (def) result.characters[charId] = def;
    } else {
      const bases = {};
      for (const d of dirs) {
        const def = buildDef(c.directions[d], prefix);
        if (def) bases[d] = def;
      }
      if (Object.keys(bases).length) result.characters[charId] = { bases };
    }
  }
  document.getElementById('output').value = JSON.stringify(result, null, 2);
}

function filePath(f, prefix) {
  return prefix + f.stem + f.ext;
}

function buildDef(dd, prefix) {
  const files = dd.files;
  const base = files.find(f => f.role === 'base');
  if (!base) return null;
  const def = { base: filePath(base, prefix) };

  // blink
  const blinks = files.filter(f => f.role === 'blink')
    .sort((a,b) => (a.stem < b.stem ? -1 : 1));
  if (blinks.length) {
    def.blink = blinks.map(f => filePath(f, prefix));
    if (dd.blinkFrameMs !== 90) def.blinkFrameMs = dd.blinkFrameMs;
  }

  // mouth
  const mouth = files.find(f => f.role === 'mouth');
  if (mouth) def.mouth = filePath(mouth, prefix);

  // noBlink
  if (dd.noBlink.size) def.noBlink = [...dd.noBlink].sort();

  // expressionBlink
  const eb = {};
  for (const [expr, setName] of Object.entries(dd.exprBlink)) {
    const frames = files.filter(f => f.role === setName)
      .sort((a,b) => (a.stem < b.stem ? -1 : 1));
    if (frames.length) eb[expr] = frames.map(f => filePath(f, prefix));
  }
  if (Object.keys(eb).length) def.expressionBlink = eb;

  // expressionMouth
  const em = {};
  for (const [expr, setName] of Object.entries(dd.exprMouth)) {
    const mf = files.find(f => f.role === setName);
    if (mf) em[expr] = filePath(mf, prefix);
  }
  if (Object.keys(em).length) def.expressionMouth = em;

  // expressions
  const expressions = { 'normal': [] };
  for (const f of files) {
    if (f.role === 'expression') expressions[f.typeName] = [filePath(f, prefix)];
  }
  def.expressions = expressions;

  return def;
}

function copyOutput() {
  const o = document.getElementById('output');
  if (o.value) navigator.clipboard.writeText(o.value);
}
